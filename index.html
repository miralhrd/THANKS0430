          <div className="admin-section slideUp" style={{animationDelay:"0.15s"}}>
            <p className="text-[10px] font-extrabold text-slate-500 tracking-widest uppercase mb-3">🏆 가장 많이 받은 분</p>
            {stats.topReceivers.length===0 ? (
              <p className="text-[12px] text-slate-400 font-bold text-center py-3">아직 데이터가 없어요</p>
            ) : stats.topReceivers.map((p,i)=>{
              const sp = parseS(p.name);
              return(
                <div key={i} className="flex items-center justify-between py-2 border-b border-slate-50 last:border-0">
                  <div className="flex items-center gap-2 min-w-0">
                    <span className="text-sm font-black w-5 text-center" style={{color:i===0?'#F59E0B':i===1?'#94A3B8':i===2?'#A16207':'#CBD5E1'}}>{i+1}</span>
                    <span className="text-[12.5px] font-extrabold text-slate-800 truncate">{sp.name} <span className="text-[10px] font-bold text-slate-400">{sp.role}</span></span>
                  </div>
                  <span className="text-[12px] font-extrabold text-emerald-700 tabular">{p.count}통</span>
                </div>
              );
            })}
          </div>

          <div className="admin-section slideUp" style={{animationDelay:"0.2s"}}>
            <p className="text-[10px] font-extrabold text-slate-500 tracking-widest uppercase mb-3">💌 가장 많이 보낸 분</p>
            {stats.topSenders.length===0 ? (
              <p className="text-[12px] text-slate-400 font-bold text-center py-3">아직 데이터가 없어요</p>
            ) : stats.topSenders.map((p,i)=>{
              const sp = parseS(p.name);
              return(
                <div key={i} className="flex items-center justify-between py-2 border-b border-slate-50 last:border-0">
                  <div className="flex items-center gap-2 min-w-0">
                    <span className="text-sm font-black w-5 text-center" style={{color:i===0?'#F59E0B':i===1?'#94A3B8':i===2?'#A16207':'#CBD5E1'}}>{i+1}</span>
                    <span className="text-[12.5px] font-extrabold text-slate-800 truncate">{sp.name} <span className="text-[10px] font-bold text-slate-400">{sp.role}</span></span>
                  </div>
                  <span className="text-[12px] font-extrabold text-emerald-700 tabular">{p.count}통</span>
                </div>
              );
            })}
          </div>

          <div className="admin-section slideUp" style={{animationDelay:"0.25s"}}>
            <p className="text-[10px] font-extrabold text-slate-500 tracking-widest uppercase mb-3">🌡️ 온도 분포</p>
            {[
              {label:'36.5~50°C', count:stats.tempDist.t1, color:'#94A3B8'},
              {label:'50~70°C', count:stats.tempDist.t2, color:'#10B981'},
              {label:'70~90°C', count:stats.tempDist.t3, color:'#F59E0B'},
              {label:'90°C 이상', count:stats.tempDist.t4, color:'#EF4444'}
            ].map((d,i)=>{
              const total = stats.tempDist.t1+stats.tempDist.t2+stats.tempDist.t3+stats.tempDist.t4 || 1;
              const pct = (d.count/total*100).toFixed(0);
              return(
                <div key={i} className="mb-2">
                  <div className="flex items-center justify-between text-[11.5px] font-extrabold mb-1">
                    <span style={{color:d.color}}>{d.label}</span>
                    <span className="tabular text-slate-700">{d.count}명 ({pct}%)</span>
                  </div>
                  <div className="h-1.5 rounded-full overflow-hidden" style={{background:'#F1F5F9'}}>
                    <div className="h-full rounded-full" style={{width:`${pct}%`,background:d.color,transition:'width 0.4s'}}/>
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}
    </>
  );
}

function AdminQR({user, onBack}){
  const [events,setEvents]=useState([]);
  const [loading,setLoading]=useState(true);
  const [creating,setCreating]=useState(false);
  const [showQR,setShowQR]=useState(null);

  const reload = ()=>{
    setLoading(true);
    apiCall({action:"adminGetQRList",name:user}).then(r=>{
      if(r.ok) setEvents(r.events||[]);
      setLoading(false);
    });
  };

  useEffect(reload,[user]);

  const doDelete = async (e)=>{
    if(!confirm(`"${e.name}" 행사 QR을 중지할까요?`)) return;
    const r = await apiCall({action:"adminDeleteQR",name:user,eventId:e.id});
    if(r.ok) reload();
    else alert(r.error||"실패");
  };

  const fmt = (ts)=>{
    const d = new Date(ts);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  };

  return(
    <>
      <div className="flex items-center justify-between mb-3 slideUp">
        <button onClick={onBack} className="text-[12px] font-bold text-emerald-700 hover:text-emerald-900 track-tight">← 뒤로</button>
        <button onClick={()=>setCreating(true)}
          className="btn btn-g px-3 py-1.5 rounded-full text-[12px] flex items-center gap-1 track-tight">
          <span>+</span><span>새 QR</span>
        </button>
      </div>

      {loading ? (
        <div className="py-12 text-center"><div className="sp sp-g mx-auto" style={{width:32,height:32,borderWidth:3}}/></div>
      ) : events.length===0 ? (
        <div className="admin-section slideUp text-center py-10">
          <div className="text-5xl mb-3 opacity-40">📷</div>
          <p className="text-sm font-bold text-slate-400 track-tight">아직 생성된 QR이 없어요</p>
          <p className="text-[11px] text-slate-400 mt-1 font-medium">상단 [+ 새 QR] 버튼으로 만들어보세요</p>
        </div>
      ) : events.map(e=>(
        <div key={e.id} className={`qr-event-card slideUp ${(e.isExpired||!e.active)?'expired':''}`}>
          <div className="flex items-start justify-between gap-2 mb-2">
            <div className="min-w-0 flex-1">
              <div className="flex items-center gap-2 flex-wrap">
                <span className="text-sm font-extrabold text-slate-900 track-tight">{e.name}</span>
                {!e.active && <span className="text-[9px] font-extrabold px-1.5 py-0.5 rounded-full bg-slate-200 text-slate-500">중지됨</span>}
                {e.active && e.isExpired && <span className="text-[9px] font-extrabold px-1.5 py-0.5 rounded-full" style={{background:'#FEE2E2',color:'#991B1B'}}>만료</span>}
                {e.active && !e.isExpired && <span className="text-[9px] font-extrabold px-1.5 py-0.5 rounded-full" style={{background:'#D1FAE5',color:'#065F46'}}>● 진행 중</span>}
              </div>
              <div className="text-[11px] text-slate-500 font-medium mt-1">만료: {fmt(e.expiresAt)}</div>
              <div className="text-[11px] text-emerald-700 font-extrabold tabular mt-0.5">참여: {e.participantCount}명</div>
            </div>
          </div>
          <div className="flex gap-1.5 flex-wrap">
            <button onClick={()=>setShowQR(e)}
              className="text-[10.5px] font-bold px-2.5 py-1 rounded-lg" style={{background:'#DBEAFE',color:'#1E40AF'}}>📷 QR 보기</button>
            {e.active && !e.isExpired && (
              <button onClick={()=>doDelete(e)}
                className="text-[10.5px] font-bold px-2.5 py-1 rounded-lg" style={{background:'#FEE2E2',color:'#991B1B'}}>🚫 중지</button>
            )}
          </div>
        </div>
      ))}

      {creating && <QRCreateModal user={user} onClose={()=>setCreating(false)} onCreated={()=>{setCreating(false);reload();}}/>}
      {showQR && <QRViewModal event={showQR} onClose={()=>setShowQR(null)}/>}
    </>
  );
}

function QRCreateModal({user, onClose, onCreated}){
  const [eventName,setEventName]=useState("");
  const [date,setDate]=useState("");
  const [time,setTime]=useState("23:59");
  const [creating,setCreating]=useState(false);
  const [err,setErr]=useState("");

  useEffect(()=>{
    document.body.classList.add("modal-open");
    const t = new Date();
    setDate(`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`);
    return()=>document.body.classList.remove("modal-open");
  },[]);

  const create = async ()=>{
    setErr("");
    if(!eventName.trim()){setErr("행사명을 입력해주세요");return;}
    if(!date||!time){setErr("만료일시를 선택해주세요");return;}
    const expiresAt = new Date(`${date}T${time}:00`).getTime();
    if(expiresAt < Date.now()){setErr("만료일시는 미래여야 해요");return;}
    setCreating(true);
    const r = await apiCall({action:"adminCreateQR",name:user,eventName:eventName.trim(),expiresAt});
    setCreating(false);
    if(!r.ok){setErr(r.error||"생성 실패");return;}
    onCreated();
  };

  return(
    <div className="fixed inset-0 z-[110] glass-overlay flex items-center justify-center fadeIn p-5" onClick={onClose}>
      <div className="bg-white rounded-[28px] w-full max-w-sm overflow-hidden popIn" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between px-5 py-4" style={{borderBottom:"1px solid var(--line-soft)"}}>
          <h3 className="font-extrabold text-base track-tighter">📷 새 QR 코드 만들기</h3>
          <button onClick={onClose} className="w-9 h-9 rounded-full hover:bg-slate-100 flex items-center justify-center text-slate-500">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div className="p-5 space-y-3">
          <div>
            <label className="block text-[11px] font-extrabold text-slate-600 mb-1.5 tracking-widest uppercase">행사명</label>
            <input value={eventName} onChange={e=>setEventName(e.target.value)} placeholder="예: 2026 신년회"
              className="ipt w-full px-3 py-2.5 text-sm font-semibold"/>
          </div>
          <div className="grid grid-cols-2 gap-2">
            <div>
              <label className="block text-[11px] font-extrabold text-slate-600 mb-1.5 tracking-widest uppercase">만료일</label>
              <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="ipt w-full px-3 py-2.5 text-sm font-semibold"/>
            </div>
            <div>
              <label className="block text-[11px] font-extrabold text-slate-600 mb-1.5 tracking-widest uppercase">만료시간</label>
              <input type="time" value={time} onChange={e=>setTime(e.target.value)} className="ipt w-full px-3 py-2.5 text-sm font-semibold"/>
            </div>
          </div>
          {err && <p className="text-xs text-rose-500 font-semibold text-center">{err}</p>}
          <button onClick={create} disabled={creating}
            className="w-full mt-2 py-3 rounded-2xl btn btn-g text-sm disabled:opacity-60 flex items-center justify-center gap-2 track-tight">
            {creating && <div className="sp"/>}
            {creating?"생성 중...":"생성하기"}
          </button>
        </div>
      </div>
    </div>
  );
}

function QRViewModal({event, onClose}){
  const canvasRef = useRef(null);
  const [dataUrl,setDataUrl]=useState("");

  useEffect(()=>{document.body.classList.add("modal-open");return()=>document.body.classList.remove("modal-open");},[]);

  useEffect(()=>{
    const content = JSON.stringify({t:'gamsahaeu_qr', eid:event.id, tk:event.token});
    if(window.QRCode && canvasRef.current){
      window.QRCode.toCanvas(canvasRef.current, content, {
        width: 280, margin: 2,
        color: { dark: '#064E3B', light: '#FFFFFF' }
      },(err)=>{
        if(!err && canvasRef.current){
          setDataUrl(canvasRef.current.toDataURL('image/png'));
        }
      });
    }
  },[event]);

  const download = ()=>{
    if(!dataUrl) return;
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = `gamsahaeu_qr_${event.name.replace(/\s/g,'_')}.png`;
    a.click();
  };

  const fmt = (ts)=>{
    const d = new Date(ts);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  };

  return(
    <div className="fixed inset-0 z-[110] glass-overlay flex items-center justify-center fadeIn p-5" onClick={onClose}>
      <div className="bg-white rounded-[28px] w-full max-w-sm overflow-hidden popIn" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between px-5 py-4" style={{borderBottom:"1px solid var(--line-soft)"}}>
          <h3 className="font-extrabold text-base track-tighter">📷 {event.name}</h3>
          <button onClick={onClose} className="w-9 h-9 rounded-full hover:bg-slate-100 flex items-center justify-center text-slate-500">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div className="p-5 text-center">
          <div className="rounded-2xl p-4 mb-3 inline-block" style={{background:"#F8FAFC",border:"1px solid var(--line-soft)"}}>
            <canvas ref={canvasRef} style={{display:'block'}}/>
          </div>
          <p className="text-[11px] font-bold text-slate-500 mb-1">만료: {fmt(event.expiresAt)}</p>
          <p className="text-[11px] font-extrabold text-emerald-700 mb-4 tabular">참여: {event.participantCount}명</p>
          <button onClick={download}
            className="btn btn-g w-full py-3 rounded-2xl text-sm flex items-center justify-center gap-2 track-tight">
            📥 PNG 다운로드
          </button>
          <p className="text-[10px] text-slate-400 mt-3 leading-relaxed font-medium">
            행사장에서 인쇄하여 게시하면<br/>
            직원들이 QR을 스캔할 수 있어요
          </p>
        </div>
      </div>
    </div>
  );
}

function AdminNotice({user, onBack}){
  const [active,setActive]=useState(false);
  const [content,setContent]=useState("");
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);

  useEffect(()=>{
    apiCall({action:"adminGetNotice",name:user}).then(r=>{
      if(r.ok){
        setActive(r.active);
        setContent(r.content);
      }
      setLoading(false);
    });
  },[user]);

  const save = async ()=>{
    setSaving(true);
    const r = await apiCall({action:"adminUpdateNotice",name:user,active,content});
    setSaving(false);
    alert(r.ok?"✅ 저장 완료":r.error||"실패");
  };

  return(
    <>
      <div className="flex items-center mb-3 slideUp">
        <button onClick={onBack} className="text-[12px] font-bold text-emerald-700 hover:text-emerald-900 track-tight">← 뒤로</button>
      </div>

      {loading ? (
        <div className="py-12 text-center"><div className="sp sp-g mx-auto" style={{width:32,height:32,borderWidth:3}}/></div>
      ) : (
        <div className="admin-section slideUp" style={{animationDelay:"0.05s"}}>
          <p className="text-sm font-extrabold text-slate-900 mb-3 track-tighter">📢 공지사항 관리</p>

          <div className="flex gap-2 mb-4">
            <button onClick={()=>setActive(true)}
              className="flex-1 py-2.5 rounded-xl text-[12px] font-extrabold track-tight transition-colors"
              style={{background:active?'#10B981':'#F1F5F9',color:active?'#fff':'#94A3B8'}}>
              ✓ 활성
            </button>
            <button onClick={()=>setActive(false)}
              className="flex-1 py-2.5 rounded-xl text-[12px] font-extrabold track-tight transition-colors"
              style={{background:!active?'#94A3B8':'#F1F5F9',color:!active?'#fff':'#94A3B8'}}>
              □ 비활성
            </button>
          </div>

          <label className="block text-[11px] font-extrabold text-slate-600 mb-1.5 tracking-widest uppercase">공지 내용</label>
          <textarea value={content} onChange={e=>setContent(e.target.value.slice(0,200))} rows={4}
            placeholder="예: 2026 상반기 감사해U 캠페인 진행 중! 100°C 도달 시 특별 선물이 기다리고 있어요 🎁"
            className="ipt w-full px-3 py-2.5 text-sm font-medium resize-none"/>
          <div className="text-[10px] text-slate-400 text-right mt-1 font-bold tabular">{content.length}/200</div>

          {active && content && (
            <div className="mt-3">
              <p className="text-[10px] font-extrabold text-slate-500 tracking-widest uppercase mb-1.5">📱 미리보기</p>
              <div className="notice-banner">
                <span style={{marginRight:'6px'}}>📢</span>
                {content}
              </div>
            </div>
          )}

          <button onClick={save} disabled={saving}
            className="w-full mt-4 py-3 rounded-2xl btn btn-g text-sm disabled:opacity-60 flex items-center justify-center gap-2 track-tight">
            {saving && <div className="sp"/>}
            {saving?"저장 중...":"저장"}
          </button>
        </div>
      )}
    </>
  );
}

// ========================================================================
// App 컴포넌트
// ========================================================================
function App(){
  const [user,setUser]=useState(null);
  const [refreshKey,setRefreshKey]=useState(0);
  const [openInbox,setOpenInbox]=useState(false);
  const [openScan,setOpenScan]=useState(false);
  const [adminMode,setAdminMode]=useState(false);
  const [hasAdmin,setHasAdmin]=useState(false);
  const [toast,setToast]=useState(null);
  const lastInboxCountRef = useRef(0);
  const buttonShakeRef = useRef(null);

  useEffect(()=>{
    const saved = localStorage.getItem("currentUser");
    if(saved && STAFF.includes(saved)) setUser(saved);
  },[]);

  const handleLogin = (name)=>{
    localStorage.setItem("currentUser",name);
    setUser(name);
  };

  const handleSent = ()=>{ setRefreshKey(k=>k+1); };
  const handleQRSuccess = ()=>{ setOpenScan(false); setRefreshKey(k=>k+1); };

  const handleDashboardLoaded = useCallback((r)=>{
    if(r.isAdmin) setHasAdmin(true);
    if(lastInboxCountRef.current > 0 && r.inbox && r.inbox.length > lastInboxCountRef.current){
      const newOnes = r.inbox.length - lastInboxCountRef.current;
      const newest = r.inbox[0];
      const sender = parseS(newest.from);
      setToast({
        title:`💌 ${newOnes}개의 새 쪽지가 도착했어요!`,
        body:`${sender.name} ${sender.role}님으로부터`,
        icon:"💌",
        onTap:()=>setOpenInbox(true)
      });
      playDing();
      const btn = document.querySelector('button[data-inbox-btn]');
      if(btn){ btn.classList.add('btn-shake'); setTimeout(()=>btn.classList.remove('btn-shake'),3500); }
    }
    if(r.inbox) lastInboxCountRef.current = r.inbox.length;
  },[]);

  // 자동 폴링 (1분마다)
  useEffect(()=>{
    if(!user || adminMode) return;
    const interval = setInterval(()=>{
      setRefreshKey(k=>k+1);
    },60000);
    return ()=>clearInterval(interval);
  },[user,adminMode]);

  if(!user) return <LoginScreen onLogin={handleLogin}/>;

  if(adminMode){
    return <AdminMode user={user} onExit={()=>setAdminMode(false)}/>;
  }

  return(
    <>
      <Dashboard
        user={user}
        refreshKey={refreshKey}
        onSent={handleSent}
        onLoaded={handleDashboardLoaded}
        onOpenInbox={()=>setOpenInbox(true)}
        onOpenScan={()=>setOpenScan(true)}
        onOpenAdmin={()=>setAdminMode(true)}
        hasAdmin={hasAdmin}
      />
      {openInbox && <InboxModal user={user} onClose={()=>setOpenInbox(false)} onChange={()=>setRefreshKey(k=>k+1)}/>}
      {openScan && <QRScanModal user={user} onClose={()=>setOpenScan(false)} onSuccess={handleQRSuccess}/>}
      {toast && <NotifyToast toast={toast} onClose={()=>setToast(null)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
