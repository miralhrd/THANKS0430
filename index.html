<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>밀알복지재단 감사해U</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin/>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg-base:#F9FAFB; --bg-tint:#F4FBF7;
  --ink-900:#0F172A; --ink-700:#334155; --ink-500:#64748B;
  --ink-400:#94A3B8; --ink-300:#CBD5E1; --ink-200:#E2E8F0;
  --line:rgba(15,23,42,0.06); --line-soft:rgba(15,23,42,0.04);
  --em-50:#ECFDF5; --em-100:#D1FAE5; --em-200:#A7F3D0;
  --em-300:#6EE7B7; --em-400:#34D399; --em-500:#10B981;
  --em-600:#059669; --em-700:#047857; --em-800:#065F46; --em-900:#064E3B;
  --spring:cubic-bezier(0.34,1.56,0.64,1);
  --ease-out:cubic-bezier(0.22,0.61,0.36,1);
}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box;}
html,body,#root{height:100%;}
body{
  font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  letter-spacing:-0.02em; word-break:keep-all; overflow-wrap:break-word;
  background:
    radial-gradient(1200px 600px at 10% -10%, rgba(16,185,129,0.06), transparent 60%),
    radial-gradient(1000px 500px at 110% 110%, rgba(5,150,105,0.05), transparent 55%),
    var(--bg-base);
  min-height:100vh; overflow-x:hidden;
  -webkit-font-smoothing:antialiased; color:var(--ink-900);
}
.logo-font{font-family:'Jua',sans-serif;letter-spacing:-0.01em;}
.fw700{font-weight:700;letter-spacing:-0.025em;}
.fw800{font-weight:800;letter-spacing:-0.035em;}
.fw900{font-weight:900;letter-spacing:-0.04em;}
.track-tight{letter-spacing:-0.025em;}
.track-tighter{letter-spacing:-0.035em;}

.card{background:#fff;border:1px solid var(--line-soft);border-radius:24px;
  box-shadow:0 1px 2px rgba(15,23,42,0.025),0 4px 14px rgba(15,23,42,0.035),0 20px 48px rgba(15,23,42,0.04);}
.card-hero{background:linear-gradient(180deg,#FFFFFF 0%, #FAFDFB 100%);
  border:1px solid rgba(16,185,129,0.08);border-radius:28px;
  box-shadow:0 1px 2px rgba(15,23,42,0.025),0 4px 18px rgba(15,23,42,0.04),0 24px 60px rgba(6,95,70,0.06);}

.btn{transition:transform 0.28s var(--spring), filter 0.2s var(--ease-out), box-shadow 0.28s var(--ease-out), background 0.2s var(--ease-out);will-change:transform;}
.btn:hover:not(:disabled){transform:translateY(-1.5px);filter:brightness(1.03);}
.btn:active:not(:disabled){transform:scale(0.965);transition-duration:0.12s;}

.btn-g{background:linear-gradient(135deg,#10B981 0%, #059669 58%, #047857 100%);
  color:#fff;font-weight:700;letter-spacing:-0.02em;
  box-shadow:0 1px 2px rgba(6,95,70,0.2),0 6px 16px rgba(16,185,129,0.28),inset 0 1px 0 rgba(255,255,255,0.2);}
.btn-g:hover:not(:disabled){background:linear-gradient(135deg,#059669 0%, #047857 60%, #065F46 100%);}
.btn-g:disabled{background:linear-gradient(135deg,#E2E8F0,#CBD5E1);color:#fff;box-shadow:none;cursor:not-allowed;}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{opacity:0;transform:scale(.94) translateY(4px)}60%{transform:scale(1.015) translateY(0);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes scaleIn{0%{opacity:0;transform:scale(.7)}60%{transform:scale(1.03);opacity:1}100%{transform:scale(1)}}
@keyframes wiggle{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes bounceY{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes sproutAnim{0%,100%{transform:translateY(0) rotate(-1deg)}30%{transform:translateY(-8px) rotate(2deg)}60%{transform:translateY(-2px) rotate(-1deg)}}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes badgeIn{0%{transform:scale(0) translateY(8px);opacity:0}60%{transform:scale(1.1) translateY(-2px);opacity:1}100%{transform:scale(1) translateY(0);opacity:1}}
@keyframes arrowUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseRing{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.28)}50%{box-shadow:0 0 0 12px rgba(16,185,129,0)}}
@keyframes countPop{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes spin-cw{to{transform:rotate(360deg)}}
@keyframes floatA{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-8px) rotate(2deg)}}
@keyframes floatB{0%,100%{transform:translateY(0) rotate(3deg)}50%{transform:translateY(-6px) rotate(-3deg)}}
@keyframes toastIn{0%{opacity:0;transform:translateY(-24px) scale(.94)}60%{transform:translateY(2px) scale(1.01);opacity:1}100%{transform:translateY(0) scale(1)}}
@keyframes toastOut{to{opacity:0;transform:translateY(-12px) scale(.96)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-2px)}40%,80%{transform:translateX(2px)}}
@keyframes glowPulse{0%,100%{box-shadow:0 4px 16px rgba(16,185,129,0.32)}50%{box-shadow:0 4px 24px rgba(16,185,129,0.55),0 0 0 4px rgba(16,185,129,0.2)}}
@keyframes giftPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes scanLine{0%{top:0}50%{top:calc(100% - 2px)}100%{top:0}}

.fadeIn{animation:fadeIn .35s var(--ease-out) forwards}
.slideUp{animation:slideUp .42s var(--spring) forwards}
.popIn{animation:popIn .38s var(--spring) forwards}
.scaleIn{animation:scaleIn .48s var(--spring) forwards}
.wiggle{animation:wiggle 3s ease-in-out infinite;display:inline-block}
.bounceY{animation:bounceY 2s ease-in-out infinite;display:inline-block}
.sprout{animation:sproutAnim 1.6s ease-in-out infinite;display:inline-block}
.pulseRing{animation:pulseRing 2s ease-in-out infinite}
.countPop{animation:countPop 1.8s ease-in-out infinite}

.tmpl{cursor:pointer;border:1.5px solid var(--line);background:#fff;border-radius:16px;transition:all .3s var(--spring);}
.tmpl:hover{transform:translateY(-1.5px);box-shadow:0 6px 18px rgba(15,23,42,0.06);border-color:rgba(16,185,129,0.25);}
.tmpl.sel{background:linear-gradient(180deg,#ECFDF5 0%, #F0FDF4 100%);border-color:#10B981;
  box-shadow:0 4px 14px rgba(16,185,129,.14), inset 0 0 0 1px rgba(16,185,129,0.15);}

.dept-h{position:sticky;top:0;z-index:1;background:rgba(236,253,245,0.92);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  padding:6px 14px;font-size:10px;font-weight:800;color:#047857;
  text-transform:uppercase;letter-spacing:0.08em;border-bottom:1px solid rgba(16,185,129,0.1);}

input:focus,textarea:focus{outline:none;box-shadow:0 0 0 4px rgba(16,185,129,.14), inset 0 0 0 1.5px #10B981;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:rgba(16,185,129,0.25);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:rgba(16,185,129,0.4);}

input,textarea,select{font-family:inherit;}

input::-ms-reveal, input::-ms-clear,
input::-webkit-credentials-auto-fill-button,
input::-webkit-strong-password-auto-fill-button,
input::-webkit-contacts-auto-fill-button,
input::-webkit-caps-lock-indicator{
  display:none !important; visibility:hidden !important;
  pointer-events:none !important; width:0 !important;height:0 !important;margin:0 !important;
}

body.modal-open{overflow:hidden;}
.tabular{font-variant-numeric:tabular-nums;}

.cbit{position:fixed;top:-20px;z-index:200;width:8px;height:12px;border-radius:2px;pointer-events:none;animation:confettiFall 2.5s ease-in forwards;}

.sp{display:inline-block;width:18px;height:18px;border-radius:50%;border:2.5px solid rgba(255,255,255,0.32);border-top-color:#fff;animation:spin-cw 0.7s linear infinite;flex-shrink:0;}
.sp-g{border-color:rgba(16,185,129,0.18);border-top-color:#10B981;}

.pin-input::placeholder{font-size:0.78rem;font-weight:500;letter-spacing:0.02em;color:var(--ink-400);}

.glass{background:rgba(255,255,255,0.72);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);
  border:1px solid rgba(255,255,255,0.5);box-shadow:0 1px 2px rgba(15,23,42,0.04),0 24px 60px rgba(15,23,42,0.12);}
.glass-overlay{background:rgba(15,23,42,0.25);backdrop-filter:blur(10px) saturate(140%);-webkit-backdrop-filter:blur(10px) saturate(140%);}
.glass-light{background:rgba(249,250,251,0.85);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);}

.ipt{background:#F8FAFC;border:1.5px solid var(--line);border-radius:16px;
  transition:border-color .2s var(--ease-out), background .2s var(--ease-out);}
.ipt:hover{border-color:rgba(16,185,129,0.22);background:#fff;}

.chip-g{background:linear-gradient(135deg,#ECFDF5 0%, #D1FAE5 100%);color:#047857;border:1px solid rgba(16,185,129,0.18);}

.tab-btn{flex:1;padding:9px 12px;border-radius:12px;
  font-size:13px;font-weight:700;letter-spacing:-0.02em;
  color:#64748B;background:transparent;
  transition:all .25s var(--spring);
  display:flex;align-items:center;justify-content:center;gap:6px;}
.tab-btn.active{background:#fff;color:#047857;
  box-shadow:0 1px 2px rgba(15,23,42,0.04),0 4px 12px rgba(15,23,42,0.06);}

.guide-banner{background:linear-gradient(180deg,#F0FDF4 0%, #ECFDF5 100%);
  border:1px solid rgba(16,185,129,0.16);border-radius:14px;
  padding:11px 13px;font-size:11.5px;font-weight:500;color:#065F46;
  line-height:1.65;letter-spacing:-0.015em;}

.toast-wrap{position:fixed;left:50%;top:18px;transform:translateX(-50%);
  z-index:120;width:calc(100% - 32px);max-width:380px;pointer-events:none;}
.toast{background:linear-gradient(135deg,#047857 0%,#10B981 100%);color:#fff;
  border-radius:18px;padding:13px 16px;display:flex;align-items:center;gap:11px;
  box-shadow:0 4px 14px rgba(6,95,70,0.32),0 16px 40px rgba(6,95,70,0.18);
  animation:toastIn .55s var(--spring) forwards;
  pointer-events:auto;cursor:pointer;border:1px solid rgba(255,255,255,0.18);}
.toast.leaving{animation:toastOut .35s var(--ease-out) forwards;}
.toast-icon{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.22);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.btn-shake{animation:shake .55s ease-in-out, glowPulse 1.6s ease-in-out 0.55s 2;}

.rule-card{background:linear-gradient(180deg,#FFFFFF 0%, #FAFDFB 100%);
  border:1px solid var(--line-soft);border-radius:20px;padding:14px 16px;
  box-shadow:0 1px 2px rgba(15,23,42,0.025),0 4px 14px rgba(15,23,42,0.025);}
.rule-line{display:flex;align-items:center;gap:10px;padding:5px 0;
  font-size:12.5px;font-weight:600;color:#334155;letter-spacing:-0.018em;line-height:1.5;}
.rule-line .ico{font-size:16px;flex-shrink:0;width:20px;text-align:center;}

.pin-wrap{position:relative;}
.pin-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:transparent;border:none;cursor:pointer;
  color:#94A3B8;transition:color .15s var(--ease-out), background .15s var(--ease-out);}
.pin-eye:hover{color:#10B981;background:rgba(16,185,129,0.08);}
.pin-eye:active{transform:translateY(-50%) scale(0.92);}

.milestone-card{
  background:linear-gradient(135deg,#FEF3C7 0%, #FEF9C3 100%);
  border:1.5px solid #FCD34D;border-radius:18px;
  padding:16px 14px;margin-top:14px;
  box-shadow:0 4px 14px rgba(245,158,11,0.18);
  animation:popIn .5s var(--spring) .8s both;
}
.milestone-icon{font-size:32px;display:inline-block;animation:giftPulse 1.5s ease-in-out infinite;}

.supported-by{
  display:flex;align-items:center;justify-content:center;gap:12px;
  margin-top:18px;padding-top:18px;
  border-top:1px solid rgba(15,23,42,0.06);
}
.supported-line{flex:1;height:1px;max-width:36px;
  background:linear-gradient(90deg,transparent,#A7F3D0);}
.supported-line.right{background:linear-gradient(90deg,#A7F3D0,transparent);}
.supported-content{text-align:center;}
.supported-label{font-size:9.5px;font-weight:700;color:#94A3B8;
  letter-spacing:0.18em;text-transform:uppercase;display:block;margin-bottom:3px;}
.supported-name{font-size:13px;font-weight:800;
  background:linear-gradient(135deg,#047857,#10B981);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:-0.01em;}

/* QR 스캔 작은 버튼 */
.qr-mini-btn{
  background:#fff;border:1.5px solid rgba(16,185,129,0.18);
  border-radius:14px;padding:10px 14px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-size:12.5px;font-weight:700;color:#047857;
  cursor:pointer;transition:all .25s var(--spring);
  box-shadow:0 1px 2px rgba(15,23,42,0.025);
}
.qr-mini-btn:hover{background:#F0FDF4;border-color:rgba(16,185,129,0.32);transform:translateY(-1px);}
.qr-mini-btn:active{transform:scale(0.97);}

/* 관리자 모드 버튼 */
.admin-btn{
  background:linear-gradient(135deg,#1E293B 0%, #334155 100%);
  color:#fff;border-radius:14px;padding:11px 14px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-size:12.5px;font-weight:700;letter-spacing:-0.02em;
  cursor:pointer;transition:all .25s var(--spring);
  box-shadow:0 4px 12px rgba(15,23,42,0.18);
  border:none;width:100%;
}
.admin-btn:hover{background:linear-gradient(135deg,#0F172A 0%, #1E293B 100%);transform:translateY(-1px);}

/* QR 스캔 카메라 영역 */
.qr-scanner-box{
  position:relative;width:100%;aspect-ratio:1;
  background:#000;border-radius:20px;overflow:hidden;
  box-shadow:0 0 0 4px rgba(16,185,129,0.2),0 8px 24px rgba(0,0,0,0.3);
}
.qr-scanner-box video{width:100%;height:100%;object-fit:cover;}
.qr-overlay-frame{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(circle at center, transparent 38%, rgba(0,0,0,0.45) 60%);}
.qr-overlay-corners{position:absolute;inset:25%;}
.qr-corner{position:absolute;width:28px;height:28px;border:3px solid #10B981;}
.qr-corner.tl{top:0;left:0;border-right:none;border-bottom:none;border-radius:8px 0 0 0;}
.qr-corner.tr{top:0;right:0;border-left:none;border-bottom:none;border-radius:0 8px 0 0;}
.qr-corner.bl{bottom:0;left:0;border-right:none;border-top:none;border-radius:0 0 0 8px;}
.qr-corner.br{bottom:0;right:0;border-left:none;border-top:none;border-radius:0 0 8px 0;}
.qr-scan-line{position:absolute;left:25%;right:25%;height:2px;
  background:linear-gradient(90deg,transparent,#10B981,transparent);
  box-shadow:0 0 8px #10B981;animation:scanLine 2.5s ease-in-out infinite;}

/* 공지 배너 */
.notice-banner{
  background:linear-gradient(135deg,#FEF3C7 0%, #FEF9C3 100%);
  border:1px solid rgba(245,158,11,0.3);border-radius:14px;
  padding:11px 38px 11px 14px;margin-bottom:12px;
  font-size:12.5px;font-weight:600;color:#92400E;
  line-height:1.5;letter-spacing:-0.015em;
  position:relative;animation:slideUp .4s var(--spring);
}
.notice-banner-close{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:transparent;border:none;cursor:pointer;
  color:#92400E;transition:background .15s;
}
.notice-banner-close:hover{background:rgba(146,64,14,0.1);}

/* 관리자 화면 */
.admin-section{background:#fff;border-radius:18px;padding:18px;
  border:1px solid var(--line-soft);box-shadow:0 1px 2px rgba(15,23,42,0.025);
  margin-bottom:12px;}
.admin-stat-card{background:#F8FAFC;border-radius:14px;padding:14px;text-align:center;
  border:1px solid var(--line-soft);}
.admin-stat-num{font-size:26px;font-weight:900;letter-spacing:-0.04em;
  background:linear-gradient(135deg,#047857,#10B981);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.admin-stat-label{font-size:10.5px;font-weight:700;color:#64748B;letter-spacing:0.04em;margin-top:2px;}

.admin-menu-item{
  background:#fff;border:1px solid var(--line-soft);border-radius:14px;
  padding:14px 16px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:all .25s var(--spring);
  width:100%;text-align:left;
}
.admin-menu-item:hover{transform:translateY(-1px);background:#FAFDFB;border-color:rgba(16,185,129,0.2);}
.admin-menu-icon{font-size:20px;flex-shrink:0;}
.admin-menu-title{font-size:14px;font-weight:800;color:#0F172A;letter-spacing:-0.025em;}
.admin-menu-desc{font-size:11px;font-weight:500;color:#94A3B8;margin-top:2px;}

.staff-card{
  background:#fff;border:1px solid var(--line-soft);border-radius:14px;
  padding:14px;margin-bottom:8px;
}
.staff-card.inactive{opacity:0.5;background:#F8FAFC;}

.bar-chart{display:flex;align-items:flex-end;gap:2px;height:80px;padding:8px 0;}
.bar-chart-bar{flex:1;background:linear-gradient(180deg,#10B981,#047857);
  border-radius:2px 2px 0 0;min-height:2px;transition:all .25s;
  position:relative;}

.qr-event-card{
  background:#fff;border:1px solid var(--line-soft);border-radius:14px;
  padding:14px;margin-bottom:8px;
}
.qr-event-card.expired{opacity:0.6;background:#F8FAFC;}
</style>
</head>

const PW_PREFIX = "pw";
const wrapPw = (raw) => PW_PREFIX + raw;

const CHOSUNG_LIST = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const getChosung = (str) => {
  let out = '';
  for (let i = 0; i < str.length; i++) {
    const code = str.charCodeAt(i);
    if (code >= 0xAC00 && code <= 0xD7A3) {
      const offset = code - 0xAC00;
      const choIdx = Math.floor(offset / (21 * 28));
      out += CHOSUNG_LIST[choIdx];
    } else if ((code >= 0x3131 && code <= 0x314E) || (code >= 0xFF00 && code <= 0xFFEF)) {
      out += str.charAt(i);
    } else {
      out += str.charAt(i).toLowerCase();
    }
  }
  return out;
};
const isOnlyChosung = (q) => /^[ㄱ-ㅎ\s]+$/.test(q) && q.trim().length > 0;
const matchStaff = (staff, rawQuery) => {
  const q = rawQuery.trim();
  if (!q) return true;
  const lower = staff.toLowerCase();
  if (lower.includes(q.toLowerCase())) return true;
  if (isOnlyChosung(q)) {
    const staffCho = getChosung(staff);
    const qCho = q.replace(/\s/g,'');
    if (staffCho.replace(/\s/g,'').includes(qCho)) return true;
  }
  return false;
};

const parseS = s=>{const [d,n,r]=s.split("-");return{full:s,dept:d,name:n,role:r};};
const groupByDept = list=>{
  const g={};
  list.forEach(s=>{const p=parseS(s);if(!g[p.dept])g[p.dept]=[];g[p.dept].push({...p,_key:s});});

};

function demo(p){
  const s=JSON.parse(localStorage.getItem("gu")||"{}");
  if(!s.u)s.u={};if(!s.m)s.m=[];if(!s.t)s.t={};
  const save=()=>localStorage.setItem("gu",JSON.stringify(s));
  if(p.action==="getAllStatuses"){const st={};STAFF.forEach(n=>{st[n]=!!(s.u[n]?.pw);});return{ok:true,statuses:st};}
  if(p.action==="checkUser")return{ok:true,isNew:!s.u[p.name]?.pw};
  if(p.action==="setPassword"){s.u[p.name]={pw:p.password};save();return{ok:true};}
  if(p.action==="login"){if(!s.u[p.name]?.pw||s.u[p.name].pw!==p.password)return{ok:false,error:"비밀번호가 맞지 않아요"};return{ok:true};}
  if(p.action==="getDashboard"){
    const inbox = s.m.filter(m=>m.to===p.name).sort((a,b)=>b.ts-a.ts);
    const sent = s.m.filter(m=>m.from===p.name).sort((a,b)=>b.ts-a.ts);
    const unreadCount = inbox.filter(m=>!m.read).length;
    return{ok:true,temperature:s.t[p.name]||36.5,inbox,sent,unreadCount};
  }
  if(p.action==="markAsRead"){s.m.forEach(m=>{if(m.to===p.name) m.read=true;});save();return {ok:true};}
  if(p.action==="getNotice") return {ok:true, notice:null};
  if(p.action==="sendThanks"){
    s.m.push({from:p.from,to:p.to,templates:p.templates,message:p.message,ts:Date.now(),read:false});
    if(!s.t[p.from]) s.t[p.from]=36.5;
    s.t[p.from]+=1;
    save();
    return{ok:true,myTemp:s.t[p.from],rose:true,reason:"rose",milestone:0};
  }
  if(p.action==="sendEmailNotification") return {ok:true};
  return{ok:false,error:"알 수 없는 요청"};
}

function playDing(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const now = ctx.currentTime;
    [{f:880, t:now, d:0.18, v:0.18},{f:1320,t:now+0.10, d:0.32, v:0.14}].forEach(({f,t,d,v})=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type='sine'; osc.frequency.value=f;
      gain.gain.setValueAtTime(0,t);
      gain.gain.linearRampToValueAtTime(v,t+0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001,t+d);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t); osc.stop(t+d+0.05);
    });
    setTimeout(()=>ctx.close(),700);
  }catch(e){}
}

        <linearGradient id="mg" gradientUnits="objectBoundingBox" x1="0" y1="1" x2="0" y2="0">

      <circle cx={TX} cy={BCY} r={BRO} fill="url(#tube)" stroke="rgba(15,23,42,0.06)" strokeWidth="1"/>
      <g clipPath="url(#mc)">
        <rect x="45" y={BOT} width="30" height={MH} fill="url(#mg)"
              style={{transform:`translateY(${tY}px)`,transition:"transform 1.2s cubic-bezier(.34,1.56,.64,1)"}}/>

      <rect x="51" y="16" width="5" height={BOT-16+4} rx="2.5" fill="rgba(255,255,255,0.55)"/>
      <ellipse cx={TX-9} cy={BCY-8} rx="4" ry="6" fill="rgba(255,255,255,0.38)"/>
      {[50,70,90].map(t=>(<line key={t} x1="74" y1={yAt(t)} x2="77" y2={yAt(t)} stroke="#CBD5E1" strokeWidth="1"/>))}
      <line x1="74" y1={yAt(60)} x2="83" y2={yAt(60)} stroke="#059669" strokeWidth="1.8"/>
      <text x="86" y={yAt(60)+4} fontSize="8.5" fontWeight="800" fill="#047857">60°C</text>
      <text x="111" y={yAt(60)+5} fontSize="11">☕</text>

  );

              <label className="block text-[11px] font-extrabold text-slate-600 mb-2 tracking-widest uppercase">비밀번호 (숫자 4자리)</label>

              <button onClick={reset} className="text-xs font-bold text-emerald-700 hover:text-emerald-900 mb-5 btn track-tight">← 이름 다시 선택</button>
              <div className="flex items-center gap-3 rounded-2xl p-4 mb-5"
                   style={{background:"#F8FAFC",border:"1px solid var(--line-soft)"}}>
                <div className="w-12 h-12 rounded-full flex items-center justify-center font-extrabold text-lg flex-shrink-0"
                     style={{background:"linear-gradient(135deg,#ECFDF5,#D1FAE5)",color:"#047857"}}>{sp.name.charAt(0)}</div>
                <div className="min-w-0">
                  <div className="font-extrabold text-slate-900 text-sm truncate track-tight">{sp.name} <span className="text-xs font-medium text-slate-400">{sp.role}</span></div>
                  <div className="text-xs text-slate-400 truncate font-medium">{sp.dept}</div>
                </div>
              </div>
              <label className="block text-[11px] font-extrabold text-slate-600 mb-2 tracking-widest uppercase">비밀번호 입력</label>
              <PinInput value={pw} onChange={setPw} onEnter={doLogin}/>
              {err&&<p className="mt-3 text-xs text-rose-500 font-semibold text-center">{err}</p>}
              <button onClick={doLogin} disabled={loading}
                className="w-full mt-6 py-4 rounded-2xl btn btn-g text-sm disabled:opacity-60 flex items-center justify-center gap-2 track-tight">
                {loading&&<div className="sp"/>}
                {loading?"확인 중...":"로그인"}
              </button>
            </div>
          )}

        <p className="text-center mt-5 text-[11px] leading-relaxed font-medium" style={{color:"#94A3B8"}}>
          비밀번호를 잊으셨다면<br/>
          <span style={{color:"#64748B",fontWeight:600}}>교육문화팀(3660)</span>으로 문의해 주세요
        </p>

        <AppFooter/>
      </div>
    </div>
  );
}

function NotifyToast({toast, onClose}){
  const [leaving,setLeaving]=useState(false);
  useEffect(()=>{
    if(!toast)return;
    const t=setTimeout(()=>{setLeaving(true);},4200);
    const t2=setTimeout(()=>{onClose();},4600);
    return()=>{clearTimeout(t);clearTimeout(t2);};
  },[toast,onClose]);
  if(!toast)return null;
  const handleClick=()=>{
    setLeaving(true);
    setTimeout(()=>{onClose();if(toast.onTap)toast.onTap();},300);
  };
  return(
    <div className="toast-wrap">
      <div className={`toast ${leaving?"leaving":""}`} onClick={handleClick}>
        <div className="toast-icon">{toast.icon||"💌"}</div>
        <div className="flex-1 min-w-0">
          <div className="font-extrabold text-sm track-tight leading-snug">{toast.title}</div>
          {toast.body&&<div className="text-[12px] text-white/85 font-medium leading-snug mt-0.5 truncate">{toast.body}</div>}
        </div>
        <div className="text-[10px] font-bold text-white/70 flex-shrink-0">탭하기</div>
      </div>
    </div>
  );
}

function NoticeBanner({notice, onClose}){
  if(!notice) return null;
  return(
    <div className="notice-banner">
      <span style={{marginRight:'6px'}}>📢</span>
      {notice}
      <button className="notice-banner-close" onClick={onClose}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
  );
}
function Dashboard({user, refreshKey, onSent, onLoaded, onOpenInbox, onOpenScan, onOpenAdmin, hasAdmin}){
  const [data,setData]=useState({temperature:36.5,inbox:[],sent:[],unreadCount:0});
  const [loading,setLoading]=useState(true);
  const [openCompose,setOpenCompose]=useState(false);
  const [notice,setNotice]=useState(null);
  const [noticeClosed,setNoticeClosed]=useState(false);

  useEffect(()=>{
    let alive=true;
    setLoading(true);
    apiCall({action:"getDashboard",name:user}).then(r=>{
      if(!alive)return;
      if(r.ok){
        setData({temperature:r.temperature,inbox:r.inbox||[],sent:r.sent||[],unreadCount:r.unreadCount||0});
        if(onLoaded)onLoaded(r);
      }
      setLoading(false);
    });
    return()=>{alive=false;};
  },[user,refreshKey,onLoaded]);

  useEffect(()=>{
    if(noticeClosed) return;
    apiCall({action:"getNotice"}).then(r=>{
      if(r.ok && r.notice) setNotice(r.notice);
    });
  },[refreshKey,noticeClosed]);

  const u=parseS(user);
  const reward=rewardInfo(data.temperature);

  return(
    <>
      <div className="min-h-screen flex flex-col items-center px-4 py-5">
        <div className="w-full max-w-sm flex flex-col flex-1">

            <div className="flex items-center gap-2">
              <span className="text-2xl wiggle" style={{display:'inline-block'}}>🌱</span>
              <span className="logo-font" style={{fontSize:"22px",
                background:"linear-gradient(135deg,#064E3B 0%,#047857 50%,#10B981 100%)",
                WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>감사해U</span>
            </div>
            <button onClick={()=>{if(confirm("로그아웃 할까요?")){localStorage.removeItem("currentUser");location.reload();}}}
              className="text-[11px] font-bold text-slate-400 hover:text-slate-700 px-3 py-1.5 rounded-full hover:bg-slate-100 transition-colors track-tight">
              로그아웃
            </button>
          </div>

          {notice && !noticeClosed && (
            <NoticeBanner notice={notice} onClose={()=>setNoticeClosed(true)}/>
          )}

          <div className="card-hero p-5 mb-4 slideUp" style={{animationDelay:"0.05s"}}>
            <div className="flex items-center gap-3 mb-3">
              <div className="w-12 h-12 rounded-full flex items-center justify-center font-extrabold text-lg flex-shrink-0"
                style={{background:"linear-gradient(135deg,#10B981,#047857)",color:"#fff",
                  boxShadow:"0 4px 12px rgba(6,95,70,0.25)"}}>{u.name.charAt(0)}</div>
              <div className="min-w-0 flex-1">
                <div className="font-extrabold text-slate-900 text-base track-tighter truncate">
                  {u.name} <span className="text-xs font-bold text-slate-400">{u.role}</span>
                </div>
                <div className="text-xs text-slate-400 font-medium truncate">{u.dept}</div>
              </div>
            </div>

            <div className="flex items-stretch gap-3 mt-2">
              <div className="flex-shrink-0 flex items-end justify-center pb-1">
                <Thermometer temp={data.temperature}/>
              </div>
              <div className="flex-1 min-w-0 flex flex-col justify-center">
                <p className="text-[11px] font-extrabold text-emerald-600 tracking-widest uppercase mb-1">현재 온도</p>
                <div className="font-black tabular leading-none mb-3" style={{
                  fontSize:"56px",letterSpacing:"-0.04em",
                  background:"linear-gradient(135deg,#064E3B 0%,#10B981 100%)",
                  WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
                  {data.temperature.toFixed(1)}<span className="text-2xl">°C</span>
                </div>
                <div className="rounded-xl px-3 py-2.5"
                  style={{background:"linear-gradient(135deg,#ECFDF5,#D1FAE5)",border:"1px solid rgba(16,185,129,0.18)"}}>
                  <div className="flex items-center gap-1.5">
                    <span className="text-base">{reward.icon}</span>
                    <span className="text-[11.5px] font-extrabold text-emerald-800 track-tight">{reward.text}</span>
                  </div>
                </div>
              </div>
            </div>

            <div className="grid grid-cols-3 gap-2 mt-4">
              {REWARDS.map(r=>{
                const reached = data.temperature >= r.temp;
                return (
                  <div key={r.temp} className="rounded-xl px-2 py-2.5 text-center"
                    style={{background:reached?"linear-gradient(135deg,#FEF3C7,#FEF9C3)":"#F8FAFC",
                      border:`1px solid ${reached?"rgba(245,158,11,0.3)":"var(--line-soft)"}`,
                      opacity:reached?1:0.7}}>
                    <div className="text-base mb-0.5">{r.icon}</div>
                    <div className="text-[10px] font-extrabold tabular" style={{color:reached?"#92400E":"#94A3B8"}}>{r.temp}°C</div>
                    <div className="text-[9px] font-bold mt-0.5" style={{color:reached?"#A16207":"#CBD5E1"}}>{r.label}</div>
                  </div>
                );
              })}
            </div>

            <div className="supported-by">
              <div className="supported-line"/>
              <div className="supported-content">
                <span className="supported-label">Supported by</span>
                <span className="supported-name">밀알디아코니아연구소</span>
              </div>
              <div className="supported-line right"/>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-3 mb-3 slideUp" style={{animationDelay:"0.1s"}}>
            <button onClick={()=>setOpenCompose(true)}
              className="btn btn-g py-3.5 rounded-2xl text-sm flex items-center justify-center gap-2 track-tight">
              <span className="text-lg">✍️</span>
              <span>쪽지 쓰기</span>
            </button>
            <button onClick={onOpenInbox}
              className="btn py-3.5 rounded-2xl text-sm flex items-center justify-center gap-2 track-tight relative"
              style={{background:"#fff",color:"#047857",border:"1.5px solid rgba(16,185,129,0.18)",
                boxShadow:"0 1px 2px rgba(15,23,42,0.025),0 4px 14px rgba(15,23,42,0.04)",fontWeight:700}}>
              <span className="text-lg">💌</span>
              <span>쪽지함</span>
              <span className="text-xs text-slate-500 font-bold ml-1">받은 {data.inbox.length} · 보낸 {data.sent.length}</span>
              {data.unreadCount>0 && (
                <span className="absolute -top-1.5 -right-1.5 min-w-[20px] h-5 px-1.5 rounded-full text-[10px] font-extrabold text-white flex items-center justify-center"
                  style={{background:"#EF4444",animation:"badgeIn .4s var(--spring)",boxShadow:"0 2px 8px rgba(239,68,68,0.4)"}}>
                  {data.unreadCount > 99 ? '99+' : data.unreadCount}
                </span>
              )}
            </button>
          </div>

          <div className="mb-3 slideUp" style={{animationDelay:"0.13s"}}>
            <button className="qr-mini-btn w-full" onClick={onOpenScan}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                <rect x="3" y="14" width="7" height="7"/><path d="M14 14h2v2"/><path d="M14 18v3"/>
                <path d="M18 14h3"/><path d="M18 18h3"/><path d="M21 21v-3"/>
              </svg>
              <span>사내 행사 QR 코드 스캔하기</span>
            </button>
          </div>

          <div className="rule-card mb-3 slideUp" style={{animationDelay:"0.15s"}}>
            <div className="rule-line"><span className="ico">💌</span><span>쪽지는 매일 무제한으로 보낼 수 있어요</span></div>
            <div className="rule-line"><span className="ico">🌡️</span><span>온도는 하루 최대 3°C까지 올라가요</span></div>
            <div className="rule-line"><span className="ico">💚</span><span>같은 분께 중복으로 보내도 서로 하루에 1°C만 올라요</span></div>
          </div>

          {hasAdmin && (
            <div className="mb-3 slideUp" style={{animationDelay:"0.18s"}}>
              <button className="admin-btn" onClick={onOpenAdmin}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>

              </button>
            </div>
          )}

          <div className="flex-1"/>
          <AppFooter/>
        </div>
      </div>

      {openCompose && (
        <ComposeModal user={user} onClose={()=>setOpenCompose(false)} onSent={()=>{setOpenCompose(false);onSent();}}/>

function ComposeModal({user, onClose, onSent}){
  const [search,setSearch]=useState("");
  const [recipient,setRecipient]=useState("");
  const [open,setOpen]=useState(false);
  const [sel,setSel]=useState([]);
  const [msg,setMsg]=useState("");
  const [sending,setSending]=useState(false);
  const [err,setErr]=useState("");
  const [success,setSuccess]=useState(null);

  useEffect(()=>{document.body.classList.add("modal-open");return()=>document.body.classList.remove("modal-open");},[]);

  const filtered=useMemo(()=>{
    const q=search.trim();
    const list = STAFF.filter(s=>s!==user);
    return q?list.filter(s=>matchStaff(s,q)):list;
  },[search,user]);
  const grouped=useMemo(()=>groupByDept(filtered),[filtered]);

  const toggleT=(id)=>{setSel(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);};

  const send=async()=>{
    setErr("");
    if(!recipient){setErr("받는 분을 선택해주세요");return;}
    if(sel.length===0 && !msg.trim()){setErr("템플릿이나 메시지 중 하나는 채워주세요");return;}
    setSending(true);
    const r=await apiCall({action:"sendThanks",from:user,to:recipient,templates:sel,message:msg});
    setSending(false);
    if(!r.ok){setErr(r.error||"전송 실패");return;}
    apiCallFireForget({action:"sendEmailNotification",from:user,to:recipient});
    setSuccess(r);
  };

  const handleSelectRecipient=(name)=>{
    setRecipient(name);setSearch(parseS(name).name);setOpen(false);
  };

  if(success){
    return <SuccessModal result={success} onDone={onSent}/>;
  }

  const rp = recipient ? parseS(recipient) : null;

  return(
    <div className="fixed inset-0 z-[100] glass-overlay flex items-end sm:items-center justify-center fadeIn" onClick={onClose}>
      <div className="bg-white w-full max-w-md rounded-t-[28px] sm:rounded-[28px] max-h-[92vh] overflow-y-auto popIn"
        onClick={e=>e.stopPropagation()}>
        <div className="sticky top-0 z-10 flex items-center justify-between px-5 py-4 bg-white/95 backdrop-blur-xl"
          style={{borderBottom:"1px solid var(--line-soft)"}}>
          <h2 className="font-extrabold text-base track-tighter">✍️ 감사 쪽지 쓰기</h2>
          <button onClick={onClose} className="w-9 h-9 rounded-full hover:bg-slate-100 flex items-center justify-center text-slate-500">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>

        <div className="p-5">
          <div className="guide-banner mb-5">
            받는 분을 선택한 뒤, 쪽지를 직접 작성하거나 템플릿을 골라 감사를 전해보세요.
            둘 중 하나만 사용해도 좋고, 함께 사용해도 좋아요.
            작은 한 마디가 상대의 하루를 따뜻하게 만들어줄 거예요.
          </div>

          <label className="block text-[11px] font-extrabold text-slate-600 mb-2 tracking-widest uppercase">받는 분</label>
          <div className="relative mb-5">
            <input type="text" value={search}
              onChange={e=>{setSearch(e.target.value);setOpen(true);if(!e.target.value)setRecipient("");}}
              onFocus={()=>setOpen(true)}
              placeholder="이름·부서·초성 검색"
              className="ipt w-full px-4 py-3.5 text-slate-800 placeholder-slate-300 font-semibold text-sm track-tight"/>
            {rp && (
              <div className="mt-2 inline-flex items-center gap-2 px-3 py-1.5 rounded-full chip-g text-xs font-bold">
                <span>{rp.name} {rp.role}</span>
                <span className="text-emerald-700/70">{rp.dept}</span>
              </div>
            )}
            {open && (
              <div className="absolute top-full left-0 right-0 mt-2 bg-white rounded-2xl max-h-72 overflow-y-auto z-20 popIn"
                style={{border:"1px solid rgba(15,23,42,0.06)",boxShadow:"0 1px 2px rgba(15,23,42,0.04),0 20px 48px rgba(15,23,42,0.1)"}}>
                {filtered.length===0
                  ?<div className="p-5 text-sm text-center text-slate-400 font-medium">검색 결과가 없어요</div>
                  :Object.entries(grouped).map(([dept,members])=>(
                    <div key={dept}>
                      <div className="dept-h">{dept}</div>
                      {members.map(m=><PersonItem key={m._key} person={m} onSelect={handleSelectRecipient}/>)}
                    </div>
                  ))}
              </div>
            )}
          </div>

          <label className="block text-[11px] font-extrabold text-slate-600 mb-2 tracking-widest uppercase">템플릿 선택 (복수 가능)</label>
          <div className="grid grid-cols-1 gap-2 mb-5">
            {TMPLS.map(t=>(
              <button key={t.id} onClick={()=>toggleT(t.id)}
                className={`tmpl px-3.5 py-3 text-left ${sel.includes(t.id)?"sel":""}`}>
                <div className="flex items-start gap-2.5">
                  <span className="text-lg flex-shrink-0">{t.emoji}</span>
                  <span className="text-[12.5px] font-semibold text-slate-700 leading-snug track-tight">{t.text}</span>
                </div>
              </button>
            ))}
          </div>

          <label className="block text-[11px] font-extrabold text-slate-600 mb-2 tracking-widest uppercase">직접 메시지 (선택)</label>
          <textarea value={msg} onChange={e=>setMsg(e.target.value.slice(0,500))} rows={3}
            placeholder="진심을 담아 한 마디 적어보세요 💚"
            className="ipt w-full px-4 py-3 text-sm font-medium text-slate-800 placeholder-slate-300 resize-none track-tight"/>
          <div className="text-[10px] text-slate-400 text-right mt-1 font-bold tabular">{msg.length}/500</div>

          {err && <p className="mt-3 text-xs text-rose-500 font-semibold text-center">{err}</p>}

          <button onClick={send} disabled={sending}
            className="w-full mt-5 py-4 rounded-2xl btn btn-g text-sm disabled:opacity-60 flex items-center justify-center gap-2 track-tight">
            {sending && <div className="sp"/>}
            {sending ? "전송 중..." : "💌 감사 전하기"}
          </button>
        </div>
      </div>
    </div>
  );
}

function SuccessModal({result, onDone}){
  const [showMsg,setShowMsg]=useState(false);
  const isDup = result.reason === "duplicate_recipient";
  const isCap = result.reason === "daily_cap_reached";
  const isNormal = !isDup && !isCap;

  useEffect(()=>{

function QRScanModal({user, onClose, onSuccess}){
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const animRef = useRef(null);
  const [status,setStatus]=useState("scanning");
  const [error,setError]=useState("");
  const [result,setResult]=useState(null);
  const scanningRef = useRef(true);

  useEffect(()=>{document.body.classList.add("modal-open");return()=>document.body.classList.remove("modal-open");},[]);

  useEffect(()=>{
    let mounted = true;
    const start = async () => {
      try{
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }
        });
        if(!mounted){ stream.getTracks().forEach(t=>t.stop()); return; }
        streamRef.current = stream;
        const video = videoRef.current;
        if(video){
          video.srcObject = stream;
          video.setAttribute('playsinline', true);
          await video.play();
          scan();
        }
      }catch(err){
        setError("카메라 권한이 필요해요. 브라우저 설정에서 카메라를 허용해주세요.");
        setStatus("error");
      }
    };
    start();
    return ()=>{
      mounted = false;
      scanningRef.current = false;
      if(animRef.current) cancelAnimationFrame(animRef.current);
      if(streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop());
    };
  },[]);

  const scan = ()=>{
    if(!scanningRef.current) return;
    const video = videoRef.current;
    const canvas = canvasRef.current;
    if(!video || !canvas || video.readyState !== 4){
      animRef.current = requestAnimationFrame(scan);
      return;
    }
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d',{willReadFrequently:true});
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height, {inversionAttempts:"dontInvert"});

    if(code){
      try{
        const parsed = JSON.parse(code.data);
        if(parsed.t === 'gamsahaeu_qr' && parsed.eid && parsed.tk){
          scanningRef.current = false;
          if(streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop());
          setStatus("verifying");
          verifyQR(parsed.eid, parsed.tk);
          return;
        }
      }catch(e){}
    }
    animRef.current = requestAnimationFrame(scan);
  };

  const verifyQR = async (eid, tk)=>{
    const r = await apiCall({action:"verifyQR", name:user, eventId:eid, token:tk});
    if(r.ok){
      setResult(r);
      setStatus("success");
      fireConfetti();
      setTimeout(()=>{ if(onSuccess) onSuccess(r); },2800);
    }else{
      setError(r.error || "인증 실패");
      setStatus("error");
    }
  };

  return(
    <div className="fixed inset-0 z-[105] glass-overlay flex items-center justify-center fadeIn p-5" onClick={onClose}>
      <div className="bg-white w-full max-w-sm rounded-[28px] overflow-hidden popIn" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between px-5 py-4" style={{borderBottom:"1px solid var(--line-soft)"}}>
          <h2 className="font-extrabold text-base track-tighter">📷 QR 코드 스캔</h2>
          <button onClick={onClose} className="w-9 h-9 rounded-full hover:bg-slate-100 flex items-center justify-center text-slate-500">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>

        <div className="p-5">
          {status === "scanning" && (
            <>
              <p className="text-[12.5px] font-medium text-slate-500 text-center mb-4 track-tight leading-relaxed">
                사내 행사에서 받은 QR 코드를<br/>카메라에 비춰주세요
              </p>
              <div className="qr-scanner-box">
                <video ref={videoRef} muted playsInline/>
                <canvas ref={canvasRef} style={{display:'none'}}/>
                <div className="qr-overlay-frame"/>
                <div className="qr-overlay-corners">
                  <div className="qr-corner tl"/><div className="qr-corner tr"/>
                  <div className="qr-corner bl"/><div className="qr-corner br"/>
                  <div className="qr-scan-line"/>
                </div>
              </div>
            </>
          )}

          {status === "verifying" && (
            <div className="py-12 text-center">
              <div className="sp sp-g mb-4 mx-auto" style={{width:40,height:40,borderWidth:3}}/>
              <p className="text-sm font-bold text-emerald-700 track-tight">QR 코드 인증 중...</p>
            </div>
          )}

          {status === "success" && result && (
            <div className="py-6 text-center scaleIn">
              <div className="text-6xl mb-3" style={{animation:"sproutAnim 1.5s ease-in-out"}}>✅</div>
              <h3 className="text-xl font-black text-slate-900 mb-2 track-tighter">인증되었어요!</h3>
              <div className="rounded-2xl p-4 mb-3"
                style={{background:"linear-gradient(135deg,#ECFDF5,#D1FAE5)",border:"1px solid rgba(16,185,129,0.2)"}}>
                <p className="text-[11px] font-extrabold text-emerald-700 tracking-wider uppercase mb-1">+1.0°C 따뜻해졌어요</p>
                <p className="text-3xl font-black tabular" style={{
                  background:"linear-gradient(135deg,#064E3B,#10B981)",
                  WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
                  {result.myTemp.toFixed(1)}<span className="text-lg">°C</span>
                </p>
              </div>
              <div className="rounded-xl px-3 py-2 inline-flex items-center gap-2"
                style={{background:"#F8FAFC",border:"1px solid var(--line-soft)"}}>
                <span className="text-base">📍</span>
                <span className="text-[12.5px] font-bold text-slate-700 track-tight">{result.eventName}</span>
              </div>
              {result.milestone>0 && (
                <div className="milestone-card mt-3">
                  <div className="milestone-icon mb-1.5">🎉</div>
                  <p className="text-sm font-extrabold text-amber-900 track-tight leading-snug">
                    축하드립니다!<br/>
                    <span className="text-base">{result.milestone}°C 보상</span>에 도달하셨어요
                  </p>
                  <p className="text-[11px] text-amber-800 mt-2 font-semibold leading-relaxed">
                    밀알디아코니아연구소에서 선물을 지급할 예정이오니<br/>교육문화팀에 신청 부탁드립니다
                  </p>
                </div>
              )}
            </div>
          )}

          {status === "error" && (
            <div className="py-8 text-center">
              <div className="text-5xl mb-3">🥲</div>
              <p className="text-sm font-bold text-slate-700 mb-4 track-tight leading-relaxed">{error}</p>
              <button onClick={onClose}
                className="btn btn-g px-6 py-3 rounded-2xl text-sm track-tight">확인</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function AdminStaff({user, onBack}){
  const [list,setList]=useState([]);
  const [search,setSearch]=useState("");
  const [loading,setLoading]=useState(true);
  const [editing,setEditing]=useState(null);
  const [adding,setAdding]=useState(false);

  const reload = ()=>{
    setLoading(true);
    apiCall({action:"adminGetAllStaff",name:user}).then(r=>{
      if(r.ok) setList(r.staff||[]);
      setLoading(false);
    });
  };

  useEffect(reload,[user]);

  const filtered = useMemo(()=>{
    const q = search.trim();
    if(!q) return list;
    return list.filter(s=>matchStaff(s.full,q) || matchStaff(s.name,q) || matchStaff(s.dept,q));
  },[list,search]);

  const doDeactivate = async (s)=>{
    if(!confirm(`${s.name} ${s.role}님을 비활성화 할까요?\n쪽지 기록은 보존되며, 명단/온도/쪽지 보내기에서만 제외됩니다.`)) return;
    const r = await apiCall({action:"adminDeactivateStaff",name:user,targetFull:s.full,active:false});
    if(r.ok) reload();
    else alert(r.error||"실패");
  };

  const doActivate = async (s)=>{
    const r = await apiCall({action:"adminDeactivateStaff",name:user,targetFull:s.full,active:true});
    if(r.ok) reload();
    else alert(r.error||"실패");
  };

  const doResetPw = async (s)=>{
    if(!confirm(`${s.name} ${s.role}님의 비밀번호를 초기화 할까요?\n다음 로그인 시 새로 설정해야 합니다.`)) return;
    const r = await apiCall({action:"adminResetPassword",name:user,targetFull:s.full});
    if(r.ok){ alert("초기화 완료"); reload(); }
    else alert(r.error||"실패");
  };

  return(
    <>
      <div className="flex items-center justify-between mb-3 slideUp">
        <button onClick={onBack} className="text-[12px] font-bold text-emerald-700 hover:text-emerald-900 track-tight">← 뒤로</button>
        <button onClick={()=>setAdding(true)}
          className="btn btn-g px-3 py-1.5 rounded-full text-[12px] flex items-center gap-1 track-tight">
          <span>+</span><span>신규 추가</span>
        </button>
      </div>

      <div className="mb-3 slideUp">
        <input type="text" value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="이름·부서·초성 검색"
          className="ipt w-full px-4 py-3 text-sm font-semibold track-tight"/>
      </div>

      <div className="space-y-2 slideUp" style={{animationDelay:"0.05s"}}>
        {loading ? (
          <div className="py-12 text-center"><div className="sp sp-g mx-auto" style={{width:32,height:32,borderWidth:3}}/></div>
        ) : filtered.length===0 ? (
          <div className="py-12 text-center text-sm text-slate-400 font-bold">검색 결과가 없어요</div>
        ) : filtered.map(s=>(
          <div key={s.full} className={`staff-card ${!s.active?'inactive':''}`}>
            <div className="flex items-start justify-between gap-2 mb-2">
              <div className="min-w-0 flex-1">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="text-sm font-extrabold text-slate-900 track-tight">{s.name} <span className="text-xs font-bold text-slate-400">{s.role}</span></span>
                  {s.isAdmin && <span className="text-[9px] font-extrabold px-1.5 py-0.5 rounded-full" style={{background:'#FEE2E2',color:'#991B1B'}}>ADMIN</span>}
                  {!s.active && <span className="text-[9px] font-extrabold px-1.5 py-0.5 rounded-full bg-slate-200 text-slate-500">비활성</span>}
                </div>
                <div className="text-[11px] text-slate-500 font-medium truncate mt-0.5">{s.dept}</div>
                <div className="text-[10px] text-slate-400 font-medium truncate">{s.email||"이메일 없음"}</div>
                <div className="flex gap-3 mt-1.5">
                  <span className="text-[10px] font-bold text-emerald-700 tabular">🌡️ {s.temp.toFixed(1)}°C</span>
                  <span className="text-[10px] font-bold tabular" style={{color:s.hasPassword?'#059669':'#94A3B8'}}>
                    🔐 {s.hasPassword?'설정됨':'미설정'}
                  </span>
                </div>
              </div>
            </div>
            <div className="flex gap-1.5 flex-wrap">
              <button onClick={()=>setEditing(s)}
                className="text-[10.5px] font-bold px-2.5 py-1 rounded-lg" style={{background:'#F1F5F9',color:'#475569'}}>✏️ 수정</button>
              <button onClick={()=>doResetPw(s)}
                className="text-[10.5px] font-bold px-2.5 py-1 rounded-lg" style={{background:'#FEF3C7',color:'#92400E'}}>🔐 비번초기화</button>
              {s.active ? (
                <button onClick={()=>doDeactivate(s)}
                  className="text-[10.5px] font-bold px-2.5 py-1 rounded-lg" style={{background:'#FEE2E2',color:'#991B1B'}}>🗑 비활성화</button>
              ) : (
                <button onClick={()=>doActivate(s)}
                  className="text-[10.5px] font-bold px-2.5 py-1 rounded-lg" style={{background:'#D1FAE5',color:'#065F46'}}>✅ 활성화</button>
              )}
            </div>
          </div>
        ))}
      </div>

      {(editing || adding) && (
        <StaffEditModal user={user} target={editing} isAdding={adding}
          onClose={()=>{setEditing(null);setAdding(false);}}
          onSaved={()=>{setEditing(null);setAdding(false);reload();}}/>
      )}
    </>
  );
}

function StaffEditModal({user, target, isAdding, onClose, onSaved}){
  const [dept,setDept]=useState(target?.dept||"");
  const [name,setName]=useState(target?.name||"");
  const [role,setRole]=useState(target?.role||"");
  const [email,setEmail]=useState(target?.email||"");
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");

  useEffect(()=>{document.body.classList.add("modal-open");return()=>document.body.classList.remove("modal-open");},[]);

  const save = async ()=>{
    setErr("");
    if(!dept.trim()||!name.trim()||!role.trim()){setErr("부서/이름/직급은 필수예요");return;}
    setSaving(true);
    let r;
    if(isAdding){
      r = await apiCall({action:"adminAddStaff",name:user,dept:dept.trim(),name:name.trim(),role:role.trim(),email:email.trim()});
    }else{
      r = await apiCall({action:"adminUpdateStaff",name:user,targetFull:target.full,dept:dept.trim(),name:name.trim(),role:role.trim(),email:email.trim()});
    }
    setSaving(false);
    if(!r.ok){setErr(r.error||"저장 실패");return;}
    onSaved();
  };

  return(
    <div className="fixed inset-0 z-[110] glass-overlay flex items-center justify-center fadeIn p-5" onClick={onClose}>
      <div className="bg-white rounded-[28px] w-full max-w-sm overflow-hidden popIn" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between px-5 py-4" style={{borderBottom:"1px solid var(--line-soft)"}}>
          <h3 className="font-extrabold text-base track-tighter">{isAdding?"신규 직원 추가":"직원 정보 수정"}</h3>
          <button onClick={onClose} className="w-9 h-9 rounded-full hover:bg-slate-100 flex items-center justify-center text-slate-500">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div className="p-5 space-y-3">
          <div>
            <label className="block text-[11px] font-extrabold text-slate-600 mb-1.5 tracking-widest uppercase">부서</label>
            <input value={dept} onChange={e=>setDept(e.target.value)} className="ipt w-full px-3 py-2.5 text-sm font-semibold"/>
          </div>
          <div>
            <label className="block text-[11px] font-extrabold text-slate-600 mb-1.5 tracking-widest uppercase">이름</label>
            <input value={name} onChange={e=>setName(e.target.value)} className="ipt w-full px-3 py-2.5 text-sm font-semibold"/>
          </div>
          <div>
            <label className="block text-[11px] font-extrabold text-slate-600 mb-1.5 tracking-widest uppercase">직급</label>
            <input value={role} onChange={e=>setRole(e.target.value)} className="ipt w-full px-3 py-2.5 text-sm font-semibold"/>
          </div>
          <div>
            <label className="block text-[11px] font-extrabold text-slate-600 mb-1.5 tracking-widest uppercase">이메일</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} className="ipt w-full px-3 py-2.5 text-sm font-semibold"/>
          </div>
          {err && <p className="text-xs text-rose-500 font-semibold text-center">{err}</p>}
          <button onClick={save} disabled={saving}
            className="w-full mt-2 py-3 rounded-2xl btn btn-g text-sm disabled:opacity-60 flex items-center justify-center gap-2 track-tight">
            {saving && <div className="sp"/>}
            {saving?"저장 중...":(isAdding?"추가하기":"저장하기")}
          </button>
        </div>
      </div>
    </div>
  );
}

function AdminReset({user, onBack}){
  const [doing,setDoing]=useState(false);

  const resetAllTemp = async ()=>{
    if(!confirm("⚠️ 모든 직원의 온도를 36.5°C로 초기화 할까요?\n\n이 작업은 되돌릴 수 없어요.")) return;
    setDoing(true);
    const r = await apiCall({action:"adminResetTemp",name:user,targetFull:"ALL"});
    setDoing(false);
    alert(r.ok?"✅ 전체 온도 초기화 완료":r.error||"실패");
  };

  return(
    <>
      <div className="flex items-center mb-3 slideUp">
        <button onClick={onBack} className="text-[12px] font-bold text-emerald-700 hover:text-emerald-900 track-tight">← 뒤로</button>
      </div>

      <div className="admin-section slideUp" style={{animationDelay:"0.05s"}}>
        <p className="text-sm font-extrabold text-slate-900 mb-2 track-tighter">🌡️ 전체 온도 초기화</p>
        <p className="text-[12px] text-slate-500 font-medium leading-relaxed mb-3">
          모든 직원의 마음의 온도를 시작값(36.5°C)으로 되돌립니다. 캠페인 시즌이 끝났을 때 사용하세요.
        </p>
        <button onClick={resetAllTemp} disabled={doing}
          className="w-full py-3 rounded-xl text-sm font-extrabold flex items-center justify-center gap-2 track-tight"
          style={{background:'#FEE2E2',color:'#991B1B'}}>
          {doing && <div className="sp" style={{borderColor:'rgba(153,27,27,0.2)',borderTopColor:'#991B1B'}}/>}
          전체 온도 초기화
        </button>
      </div>

      <div className="admin-section slideUp" style={{animationDelay:"0.1s"}}>
        <p className="text-sm font-extrabold text-slate-900 mb-2 track-tighter">💡 안내</p>
        <p className="text-[12px] text-slate-500 font-medium leading-relaxed">
          개별 직원의 온도/비번 초기화는 <span className="font-extrabold text-emerald-700">[직원 관리]</span> 메뉴에서 가능해요.
        </p>
      </div>
    </>
  );
}

function AdminStats({user, onBack}){

  const [loading,setLoading]=useState(true);

    apiCall({action:"adminGetStats",name:user}).then(r=>{
      if(r.ok) setStats(r);
      setLoading(false);
    });
  },[user]);

  return(
    <>
      <div className="flex items-center mb-3 slideUp">
        <button onClick={onBack} className="text-[12px] font-bold text-emerald-700 hover:text-emerald-900 track-tight">← 뒤로</button>
      </div>

      {loading ? (
        <div className="py-12 text-center"><div className="sp sp-g mx-auto" style={{width:32,height:32,borderWidth:3}}/></div>
      ) : stats && (
        <>
          <div className="admin-section slideUp" style={{animationDelay:"0.05s"}}>
            <p className="text-[10px] font-extrabold text-slate-500 tracking-widest uppercase mb-2">📅 일별 추이 (최근 30일)</p>
            <div className="bar-chart">
              {stats.dailyTrend.map((d,i)=>{

            <div className="flex justify-between text-[9px] font-bold text-slate-400 mt-1">
              <span>{stats.dailyTrend[0]?.date.slice(5)}</span>
              <span>{stats.dailyTrend[stats.dailyTrend.length-1]?.date.slice(5)}</span>
            </div>
          </div>

          <div className="admin-section slideUp" style={{animationDelay:"0.1s"}}>
            <p className="text-[10px] font-extrabold text-slate-500 tracking-widest uppercase mb-3">📊 이번 달</p>
            <div className="grid grid-cols-2 gap-2">
              <div className="admin-stat-card">
                <div className="admin-stat-num">{stats.monthThanks}</div>
                <div className="admin-stat-label">이번 달 쪽지</div>
              </div>
              <div className="admin-stat-card">
                <div className="admin-stat-num">{stats.tempDist.avg}<span className="text-sm">°C</span></div>
                <div className="admin-stat-label">평균 온도</div>
              </div>
            </div>
